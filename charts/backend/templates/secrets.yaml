apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-superuser-bootstrap
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: password1234
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-bootstrap
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.cnpg.owner }}
  password: password1234
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-github-pat
  labels:
    {{- include "corgi-backend.labels" . | nindent 4 }}
type: Opaque
# data: keys must be base64-encoded
stringData:
  token: someGHtoken
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corgi-backend.fullname" . }}-db-app
type: Opaque
stringData:
  uri: "postgresql://{{ .Values.cnpg.owner }}:password1234@{{ include "corgi-backend.fullname" . }}-db-rw:5432/{{ .Values.cnpg.database }}"
