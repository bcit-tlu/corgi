apiVersion: v1
kind: Secret
metadata:
  name: {{ include "corgi-backup.fullname" . }}
  labels:
    {{- include "corgi-backup.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.env.DATABASE_URL | quote }}
  S3_ACCESS_KEY: {{ .Values.env.S3_ACCESS_KEY | quote }}
  S3_SECRET_KEY: {{ .Values.env.S3_SECRET_KEY | quote }}
